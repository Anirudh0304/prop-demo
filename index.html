<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propstar Solution | India's Trusted Luxury Real Estate Consultants</title>
<meta name="description" content="Propstar Solution curates handpicked luxury projects from 40+ of India's most reputable developers. Answer a few quick questions, see your shortlist, and get 1-on-1 guidance from a luxury consultant, private site visits included. By Revspot.">
<meta name="theme-color" content="#3471DE">
<meta property="og:type" content="website">
<meta property="og:title" content="Propstar Solution | Chosen, not chased.">
<meta property="og:description" content="Handpicked luxury projects from 40+ of India's most reputable developers, with 1-on-1 guidance from a luxury consultant. Serious homes, expert eyes, zero spam.">
<meta property="og:image" content="assets/hero-poster.jpg">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"></noscript>
<style>
  :root{
    --accent:#3471DE; --accent-hover:#295FC0; --accent-soft:rgba(52,113,222,.08);
    --ink:#0B1B2E; --body:#41505F; --muted:#5F6E7E; --faint:#66727F;
    --tint:#F6F8FB; --border:#E1E8F0; --hairline:#EAEFF5;
    --hero-base:#0A1526; --footer-bg:#000015;
    --danger:#C2483C; --danger-bg:#FEF6F5; --danger-border:#F3D9D6;
    --ease:cubic-bezier(.22,.61,.36,1);
    --serif:'Instrument Serif',Georgia,serif;
    --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --glass-bg:rgba(255,255,255,.60); --glass-border:rgba(255,255,255,.62);
    --glass-shadow:0 24px 70px rgba(20,40,70,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);color:var(--body);background:#fff;font-weight:400;
    font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  img{max-width:100%;display:block}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink)}
  ::selection{background:rgba(52,113,222,.18)}

  h1,h2,h3,.serif{font-family:var(--serif);font-weight:400;color:var(--ink);letter-spacing:0}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}

  /* ---------- background media layer ---------- */
  #bg{position:fixed;inset:0;z-index:0;background:var(--hero-base);pointer-events:none}
  #bg video,#bg .poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  /* Edge-anchored scrim (no box): a smooth left-to-right wash — strongest at the
     far-left edge behind the text, fading to fully-vivid video by ~62% — plus a
     gentle vertical (nav up top, fade to white at the base). Because it's anchored
     to the viewport edges it reads as natural lighting, not a floating patch. */
  #bg .scrim{position:absolute;inset:0;background:
    linear-gradient(90deg, rgba(255,255,255,.96) 0%, rgba(255,255,255,.93) 22%, rgba(255,255,255,.82) 38%, rgba(255,255,255,.60) 50%, rgba(255,255,255,.22) 64%, rgba(255,255,255,0) 76%),
    linear-gradient(180deg, rgba(255,255,255,.30) 0%, rgba(255,255,255,.12) 28%, rgba(255,255,255,.12) 60%, rgba(255,255,255,.20) 80%, rgba(255,255,255,.66) 90%, #fff 100%)}
  #app{position:relative;z-index:1}
  /* frosted "through-line" sheet under the post-hero home content: the fixed video
     keeps showing but dimmed + blurred, so it reads as a soft cohesive backdrop
     while headings/body text stay crisp and the glass cards pop against it.
     The frost lives on ::before with a masked top edge so it FADES IN gradually
     from the vivid hero video — no hard seam at the boundary. */
  .home-sheet{position:relative;z-index:1}
  .home-sheet::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:rgba(255,255,255,.62);
    backdrop-filter:blur(26px) saturate(116%);-webkit-backdrop-filter:blur(26px) saturate(116%);
    -webkit-mask:linear-gradient(180deg, transparent 0, #000 150px);
            mask:linear-gradient(180deg, transparent 0, #000 150px)}

  /* ---------- floating glass nav ---------- */
  .nav{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:55;
    width:calc(100% - 44px);max-width:1140px;display:flex;align-items:center;justify-content:space-between;
    padding:9px 12px 9px 20px;border-radius:999px;
    background:rgba(255,255,255,.5);backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);
    border:1px solid rgba(255,255,255,.62);
    box-shadow:0 12px 40px rgba(20,40,70,.14), inset 0 1px 0 rgba(255,255,255,.8)}
  .nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
  .nav-brand img{height:26px;width:auto}
  .nav-brand span{font-weight:600;font-size:19px;color:var(--ink);letter-spacing:-.01em}
  .nav-links{display:flex;align-items:center;gap:4px;position:absolute;left:50%;transform:translateX(-50%)}
  .nav-links button{font-size:12.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:#44586B;padding:9px 16px;border-radius:999px;transition:all .3s var(--ease)}
  .nav-links button:hover{background:rgba(20,40,70,.06);color:var(--ink)}
  .nav-links button.on{background:var(--accent);color:#fff}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--accent);color:#fff;font-weight:600;font-size:13.5px;
    padding:11px 22px;border-radius:999px;transition:all .35s var(--ease)}
  .btn:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 10px 26px rgba(52,113,222,.35)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--border)}
  .btn.ghost:hover{background:var(--tint);box-shadow:none;border-color:#CBD6E2}

  /* ---------- layout helpers ---------- */
  .wrap{max-width:1240px;margin:0 auto;padding:0 26px}
  .view-in{animation:viewIn .6s var(--ease) both}
  @keyframes viewIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  .rv{opacity:0;transform:translateY(30px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .rv.in{opacity:1;transform:none}

  /* ---------- hero ---------- */
  /* svh = stable small-viewport height on iOS Safari (100vh overshoots past the URL bar) */
  .hero{min-height:100vh;min-height:100svh;display:flex;align-items:center;padding:140px 0 70px}
  .hero-grid{display:grid;grid-template-columns:1.02fr 1fr;gap:60px;align-items:center;width:100%}
  .hero h1{font-size:clamp(42px,5.4vw,68px);line-height:1.04;letter-spacing:-.01em;margin:18px 0 20px}
  .hero h1 em{font-style:italic;color:var(--accent)}
  .hero .sub{font-size:18px;font-weight:400;max-width:480px;color:var(--ink)}
  .stats{display:flex;gap:44px;margin-top:38px}
  .stats .num{font-size:clamp(30px,3vw,40px);font-weight:600;color:var(--ink);font-family:var(--sans);letter-spacing:-.02em}
  .stats .lbl{font-size:12px;font-weight:600;color:var(--body);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
  .trust-line{display:flex;align-items:center;gap:10px;margin-top:34px;font-size:13.5px;font-weight:500;color:var(--body)}
  .trust-line .dia{color:var(--accent);font-size:9px}
  /* No box/panel behind the hero copy — legibility comes from the edge-anchored
     scrim gradient (see #bg .scrim), which fades smoothly into the video. */

  /* ---------- wizard card ---------- */
  /* form sits over the vivid hero video, so keep it mostly opaque for legibility
     (a light glass tint, not see-through) */
  .wiz{background:rgba(255,255,255,.9);backdrop-filter:blur(24px) saturate(135%);-webkit-backdrop-filter:blur(24px) saturate(135%);
    border:1px solid rgba(255,255,255,.85);border-radius:24px;box-shadow:var(--glass-shadow);overflow:hidden}
  .wiz-bar{height:3px;background:rgba(20,40,70,.08)}
  .wiz-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#6AA5F8);
    transition:width .5s var(--ease)}
  .wiz-body{padding:28px 30px 30px}
  .wiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .wiz-head .step-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
  .wiz-q{font-family:var(--serif);font-size:clamp(24px,2.2vw,29px);color:var(--ink);line-height:1.15}
  .wiz-hint{font-size:13.5px;color:var(--muted);margin-top:6px}
  .opts{display:grid;gap:10px;margin-top:22px}
  .opts.two{grid-template-columns:1fr 1fr}
  .opt{display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;
    padding:15px 18px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.82);
    transition:all .3s var(--ease)}
  .opt:hover{border-color:#B9CCEE;transform:translateY(-1px)}
  .opt.on{border-color:var(--accent);background:var(--accent-soft)}
  .opt .t{font-weight:500;font-size:15px;color:var(--ink)}
  .opt .h{font-size:12.5px;color:var(--muted);font-weight:400;margin-top:1px}
  .opt .dot{width:18px;height:18px;border-radius:50%;border:2px solid #C7D3E1;flex:none;position:relative;transition:all .3s var(--ease)}
  .opt.on .dot{border-color:var(--accent)}
  .opt.on .dot::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
  .wiz-step{animation:stepIn .45s var(--ease) both}
  @keyframes stepIn{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
  .field{margin-top:14px}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .field input,.field textarea{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:12px;
    background:rgba(255,255,255,.75);outline:none;transition:border .3s var(--ease),box-shadow .3s var(--ease);font-weight:400}
  .field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,113,222,.12)}
  .phone-wrap{display:flex;gap:8px}
  .phone-wrap .cc{flex:none;display:flex;align-items:center;padding:0 14px;border:1px solid var(--border);
    border-radius:12px;background:var(--tint);font-weight:500;font-size:14px;color:var(--ink)}
  .form-err{margin-top:12px;font-size:13px;color:var(--danger);background:var(--danger-bg);
    border:1px solid var(--danger-border);border-radius:10px;padding:9px 13px;display:flex;gap:8px;align-items:center}
  .privacy-line{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--faint);margin-top:14px}
  .wiz .btn{width:100%;padding:14px;font-size:14.5px;margin-top:18px;border-radius:14px}
  .done-tick{width:54px;height:54px;border-radius:50%;background:var(--accent-soft);display:flex;
    align-items:center;justify-content:center;margin:6px auto 16px;color:var(--accent)}
  .chev{display:flex;justify-content:center;margin-top:40px;color:var(--body);
    filter:drop-shadow(0 0 6px rgba(255,255,255,.95)) drop-shadow(0 0 2px rgba(255,255,255,.9));
    animation:floatchev 2.4s ease-in-out infinite}
  @keyframes floatchev{0%,100%{transform:translateY(0);opacity:.55}50%{transform:translateY(8px);opacity:1}}

  /* ---------- marquee ---------- */
  .marquee-sec{padding:172px 0 70px}   /* extra top clears the 150px frost fade-in */
  .marquee-sec .lbl{text-align:center;font-size:11px;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:var(--muted);margin-bottom:34px}
  .marquee{overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
    mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
  .track{display:flex;align-items:center;gap:74px;width:max-content;animation:footerMarquee 34s linear infinite;padding-right:74px}
  .track:hover{animation-play-state:paused}
  .track img{height:34px;width:auto;opacity:.72;mix-blend-mode:multiply;filter:grayscale(1);transition:opacity .3s}
  .track img:hover{opacity:1}
  @keyframes footerMarquee{to{transform:translateX(-50%)}}

  /* ---------- results / cards ---------- */
  .results-sec{padding:86px 0 100px;background:linear-gradient(180deg,rgba(246,248,251,0) 0%,#F6F8FB 18%)}
  .sec-head{text-align:center;max-width:640px;margin:0 auto 26px}
  .sec-head h2{font-size:clamp(32px,4vw,48px);line-height:1.08;margin:14px 0 12px}
  .sec-head p{font-size:16.5px;color:var(--body)}
  .pills{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:22px 0 44px}
  .pill{font-size:12.5px;font-weight:600;color:var(--accent);padding:8px 16px;border-radius:999px;
    background:rgba(255,255,255,.7);backdrop-filter:blur(12px);border:1px solid rgba(52,113,222,.25)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .card{background:rgba(255,255,255,.72);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--glass-border);border-top:2px solid transparent;border-radius:16px;overflow:hidden;
    box-shadow:0 10px 30px rgba(20,40,70,.06);cursor:pointer;position:relative;
    transition:transform .35s var(--ease),box-shadow .35s var(--ease),border-color .35s var(--ease)}
  .card:hover{transform:translateY(-5px);border-top-color:var(--accent);box-shadow:0 26px 60px rgba(20,40,70,.14)}
  .card .ph{aspect-ratio:16/10;overflow:hidden;position:relative;background:var(--tint)}
  .card .ph img{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--ease)}
  .ph-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#E8EFF9 0%,#F6F8FB 55%,#DCE7F5 100%)}
  .ph-fallback span{font-family:var(--serif);font-size:64px;color:rgba(52,113,222,.35);line-height:1}
  .card:hover .ph img{transform:scale(1.045)}
  .card .ph::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,21,38,.08) 0%,rgba(10,21,38,0) 34%,rgba(10,21,38,.16) 100%)}
  .status-pill{position:absolute;top:14px;left:14px;z-index:2;font-size:11px;font-weight:600;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink);background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
    padding:6px 12px;border-radius:999px}
  .card .bd{padding:20px 22px 22px;position:relative}
  .card .dev{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  .card .nm{font-family:var(--serif);font-size:25px;color:var(--ink);margin:5px 0 2px;line-height:1.1}
  .card .lc{font-size:13.5px;color:var(--muted)}
  .match-why{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent);margin-top:7px}
  .card .go{position:absolute;right:20px;top:-24px;width:48px;height:48px;border-radius:50%;
    background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border:1px solid var(--glass-border);
    box-shadow:0 10px 26px rgba(20,40,70,.14);display:flex;align-items:center;justify-content:center;
    color:var(--ink);font-size:17px;transition:all .35s var(--ease)}
  .card:hover .go{background:var(--accent);color:#fff;transform:rotate(-45deg)}
  .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .tag{font-size:12px;font-weight:500;color:var(--body);padding:5px 12px;border-radius:999px;
    background:rgba(246,248,251,.9);border:1px solid var(--hairline)}
  .grid-foot{text-align:center;margin-top:44px}
  .grid-foot .cnt{font-size:13px;color:var(--muted);margin-bottom:16px}

  /* ---------- page sections (properties / about) ---------- */
  .page{padding:150px 0 110px}
  .page-head{text-align:center;max-width:680px;margin:0 auto 42px}
  .page-head h1{font-size:clamp(40px,5vw,60px);line-height:1.05;margin:14px 0 14px}
  .page-head p{font-size:17px}
  .filters{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:40px}
  .fbtn{font-size:12.5px;font-weight:600;padding:9px 18px;border-radius:999px;color:#44586B;
    border:1px solid var(--border);background:rgba(255,255,255,.7);transition:all .3s var(--ease)}
  .fbtn:hover{border-color:#B9CCEE}
  .fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .fbtn i{font-style:normal;font-size:11px;opacity:.75;margin-left:3px}
  .props-bg{background:#F6F8FB}

  /* ---------- about ---------- */
  .about-wrap{max-width:900px;margin:0 auto}
  .about-wrap .lede{font-size:19px;line-height:1.7;color:var(--body)}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin:52px 0}
  .stepc{background:var(--glass-bg);backdrop-filter:blur(18px) saturate(160%);border:1px solid var(--glass-border);
    border-radius:18px;box-shadow:0 10px 30px rgba(20,40,70,.06);padding:28px 26px}
  .stepc .n{font-family:var(--serif);font-size:38px;color:var(--accent);line-height:1}
  .stepc h3{font-size:19px;margin:14px 0 8px;font-family:var(--sans);font-weight:600}
  .stepc p{font-size:14px;color:var(--body)}
  .closing{font-family:var(--serif);font-size:clamp(26px,3vw,34px);text-align:center;color:var(--ink);margin-top:64px}
  .closing em{font-style:italic;color:var(--accent)}

  /* ---------- detail ---------- */
  .d-hero{position:relative;height:74vh;height:74svh;min-height:480px;overflow:hidden;background:var(--hero-base)}
  .d-hero img{width:100%;height:100%;object-fit:cover}
  .d-hero .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,21,38,.18) 0%,rgba(10,21,38,0) 34%,rgba(255,255,255,.38) 60%,rgba(255,255,255,.85) 78%,rgba(255,255,255,.96) 92%,#fff 100%)}
  .d-hero .inner{position:absolute;inset:auto 0 44px 0}
  .back-chip{position:absolute;top:110px;left:26px;z-index:5;display:inline-flex;align-items:center;gap:8px;
    font-size:12.5px;font-weight:600;color:var(--ink);background:rgba(255,255,255,.72);backdrop-filter:blur(16px);
    border:1px solid var(--glass-border);padding:9px 17px;border-radius:999px;transition:all .3s var(--ease)}
  .back-chip:hover{background:#fff;transform:translateX(-2px)}
  .photos-chip{position:absolute;bottom:150px;right:26px;font-size:12px;font-weight:600;color:var(--ink);
    background:rgba(255,255,255,.72);backdrop-filter:blur(16px);border:1px solid var(--glass-border);
    padding:8px 15px;border-radius:999px}
  .d-hero h1{font-size:clamp(40px,5vw,62px);line-height:1.02;margin:8px 0 6px}
  .d-hero .lc{font-size:16px;color:var(--body)}
  .d-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:-20px;position:relative;z-index:4}
  .d-stat{background:rgba(255,255,255,.78);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);
    border-radius:16px;box-shadow:0 10px 30px rgba(20,40,70,.06);padding:18px 20px}
  .d-stat .k{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .d-stat .v{font-size:15px;font-weight:500;color:var(--ink);margin-top:5px;line-height:1.35}
  .d-stat.hi{background:var(--accent);border-color:var(--accent)}
  .d-stat.hi .k{color:rgba(255,255,255,.75)}
  .d-stat.hi .v{color:#fff}
  .d-sec{padding:74px 0 0}
  .d-sec h2{font-size:clamp(28px,3.4vw,40px);margin:12px 0 26px}
  .cur-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .cur{display:flex;gap:14px;align-items:flex-start;background:var(--tint);border:1px solid var(--hairline);
    border-radius:14px;padding:18px 20px;font-size:15px;color:var(--ink);font-weight:400}
  .cur .dia,.amen .dia{color:var(--accent);font-size:10px;line-height:1.9;flex:none}
  .gallery{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:14px;
    -webkit-mask-image:linear-gradient(90deg,#000 92%,transparent);mask-image:linear-gradient(90deg,#000 92%,transparent)}
  .gallery::-webkit-scrollbar{height:6px}
  .gallery::-webkit-scrollbar-thumb{background:#D5DEE9;border-radius:3px}
  .gallery img{width:420px;height:280px;object-fit:cover;border-radius:14px;flex:none;scroll-snap-align:start}
  .about-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:34px;align-items:start}
  .about-grid .txt p{margin-bottom:16px;font-size:16px}
  .hl{background:var(--glass-bg);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);
    border-radius:18px;box-shadow:0 10px 30px rgba(20,40,70,.06);padding:26px}
  .hl h3{font-family:var(--sans);font-weight:600;font-size:15px;margin-bottom:16px}
  .hl .row{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid var(--hairline);font-size:13.5px}
  .hl .row:last-of-type{border-bottom:none}
  .hl .row .k{color:var(--muted)}
  .hl .row .v{color:var(--ink);font-weight:500;text-align:right}
  .hl .btn{width:100%;margin-top:16px}
  .amen-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 22px}
  .amen{display:flex;gap:11px;align-items:flex-start;font-size:14.5px;color:var(--ink);font-weight:400}
  .conn{display:flex;flex-wrap:wrap;gap:10px}
  .conn .pill{color:var(--ink);font-weight:500}
  .sticky-bar{position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(255,255,255,.72);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
    border-top:1px solid var(--glass-border);box-shadow:0 -12px 40px rgba(20,40,70,.10)}
  .sticky-bar .in{max-width:1240px;margin:0 auto;padding:13px 26px calc(13px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;justify-content:space-between;gap:16px}
  .sticky-bar .nm{font-family:var(--serif);font-size:20px;color:var(--ink)}
  .sticky-bar .sub{font-size:12.5px;color:var(--muted)}
  .d-pad-bottom{height:120px}

  /* ---------- modal ---------- */
  .mscrim{position:fixed;inset:0;z-index:80;background:rgba(11,20,32,.5);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;padding:22px;animation:fadeIn .3s var(--ease) both}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{width:100%;max-width:480px;max-height:calc(100vh - 60px);overflow-y:auto;border-radius:24px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(34px) saturate(160%);-webkit-backdrop-filter:blur(34px) saturate(160%);
    border:1px solid var(--glass-border);box-shadow:0 40px 100px rgba(11,20,32,.35);
    padding:34px 34px 30px;position:relative;animation:modalIn .45s var(--ease) both}
  @keyframes modalIn{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}
  .modal .x{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;
    transition:all .3s var(--ease)}
  .modal .x:hover{background:rgba(20,40,70,.07);color:var(--ink)}
  .modal h3{font-family:var(--serif);font-size:28px;line-height:1.12;margin:8px 0 6px;font-weight:400}
  .modal .sub{font-size:14px;color:var(--muted)}
  .modal .btn{width:100%;margin-top:20px;padding:14px;border-radius:14px;font-size:14.5px}

  /* ---------- toast ---------- */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:90;
    display:flex;align-items:center;gap:10px;background:#0E1B2C;color:#fff;font-size:14px;font-weight:500;
    padding:13px 22px;border-radius:999px;box-shadow:0 18px 50px rgba(11,20,32,.4);
    animation:toastIn .45s var(--ease) both}
  .toast .tick{color:#6FE3A6}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

  /* ---------- footer ---------- */
  footer{background:var(--footer-bg);color:#8B95AC;margin-top:0}
  footer .in{max-width:1240px;margin:0 auto;padding:64px 26px 96px}
  footer .top{display:flex;justify-content:space-between;align-items:flex-start;gap:30px;flex-wrap:wrap}
  footer .brand{display:flex;align-items:center;gap:11px}
  footer .brand img{height:28px}
  footer .brand span{font-weight:600;font-size:19px;color:#fff}
  footer .tagline{font-size:13.5px;margin-top:12px;max-width:320px}
  footer .socials{display:flex;gap:10px}
  footer .socials a{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;color:#B7C0D4;transition:all .35s var(--ease)}
  footer .socials a:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-2px)}
  footer .bottom{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;
    border-top:1px solid rgba(255,255,255,.08);margin-top:44px;padding-top:26px;font-size:13px}
  footer .bottom .links{display:flex;gap:26px}
  footer .bottom button{color:#8B95AC;font-size:13px;transition:color .3s}
  footer .bottom button:hover{color:#fff}

  /* ---------- premium polish ---------- */
  .card .ph img,.d-hero>img,.gallery img{animation:imgIn .7s var(--ease) both}
  @keyframes imgIn{from{opacity:0;transform:scale(1.02)}to{opacity:1;transform:none}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  .wiz-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    color:var(--muted);padding:5px 10px;border-radius:999px;transition:all .3s var(--ease)}
  .wiz-back:hover{color:var(--ink);background:rgba(20,40,70,.06)}
  .start-over{font-size:12.5px;color:var(--muted);text-decoration:underline;text-underline-offset:3px;transition:color .3s}
  .start-over:hover{color:var(--ink)}

  /* curation standards strip */
  .standards{padding:80px 0 90px}
  .standards .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:44px}
  /* cleaner, whiter card so it pops against the frosted dimmed-video sheet
     (was glass over the video; the sheet is now the frosted layer) */
  .std{background:rgba(255,255,255,.9);
    border:1px solid rgba(255,255,255,.85);border-radius:18px;box-shadow:0 14px 40px rgba(20,40,70,.1);padding:30px 28px}
  .std .dia{color:var(--accent);font-size:13px}
  .std h3{font-family:var(--sans);font-weight:600;font-size:17px;margin:14px 0 8px}
  .std p{font-size:14px;color:var(--body)}

  /* explore by city — editorial band */
  .cities{padding:20px 0 90px}
  /* 6 cities → balanced 3×2, not 4+2 with an orphan row */
  .cities .grid4{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:40px}
  .citycard{position:relative;height:340px;border-radius:18px;overflow:hidden;cursor:pointer;
    box-shadow:0 10px 30px rgba(20,40,70,.08);transition:transform .45s var(--ease),box-shadow .45s var(--ease)}
  .citycard:hover{transform:translateY(-6px);box-shadow:0 30px 70px rgba(20,40,70,.2)}
  .citycard img{width:100%;height:100%;object-fit:cover;transition:transform 1.1s var(--ease)}
  .citycard:hover img{transform:scale(1.06)}
  .citycard .veil{position:absolute;inset:0;background:linear-gradient(185deg,rgba(10,21,38,.05) 30%,rgba(10,21,38,.78) 100%)}
  .citycard .txt{position:absolute;left:22px;right:22px;bottom:20px;color:#fff}
  .citycard .txt .nm{font-family:var(--serif);font-size:27px;line-height:1.1}
  .citycard .txt .ct{font-size:12px;font-weight:500;opacity:.8;margin-top:4px;letter-spacing:.04em}
  .citycard .go2{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.18);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.35);
    display:flex;align-items:center;justify-content:center;color:#fff;transition:all .35s var(--ease)}
  .citycard:hover .go2{background:var(--accent);border-color:var(--accent);transform:rotate(-45deg)}

  /* closing pull-quote band */
  .quote-band{padding:110px 0 120px;text-align:center;background:linear-gradient(180deg,#fff 0%,#F6F8FB 100%)}
  .quote-band h2{font-size:clamp(38px,5vw,58px);line-height:1.08;max-width:760px;margin:16px auto 18px}
  .quote-band h2 em{font-style:italic;color:var(--accent)}
  .quote-band p{max-width:520px;margin:0 auto 30px;font-size:16.5px}

  /* button micro-interaction — arrow glides */
  .btn svg{transition:transform .35s var(--ease)}
  .btn:hover svg{transform:translateX(3px)}

  /* refined scrollbar */
  ::-webkit-scrollbar{width:11px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#C9D4E1;border-radius:8px;border:3px solid #fff}
  ::-webkit-scrollbar-thumb:hover{background:#A9BACD}

  /* sticky shortlist chip */
  .chip-cta{position:fixed;right:22px;bottom:calc(24px + env(safe-area-inset-bottom,0px));z-index:60;display:inline-flex;align-items:center;gap:9px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
    border:1px solid var(--glass-border);box-shadow:0 18px 50px rgba(20,40,70,.22);
    color:var(--ink);font-size:13px;font-weight:600;padding:13px 20px;border-radius:999px;
    transition:all .35s var(--ease);animation:chipIn .6s var(--ease) both}
  .chip-cta:hover{transform:translateY(-2px);box-shadow:0 24px 60px rgba(20,40,70,.3)}
  .chip-cta .spark{color:var(--accent)}
  @keyframes chipIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  /* .hid must kill the chipIn animation: its fill-mode would otherwise pin
     opacity:1 and win the cascade over any inline/class opacity */
  .chip-cta.hid{animation:none;opacity:0;pointer-events:none}
  .modal .alt-path{display:block;width:100%;text-align:center;font-size:13px;font-weight:600;
    color:var(--accent);margin-top:14px;padding:6px}
  .modal .alt-path:hover{color:var(--accent-hover)}

  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
    .track{animation:none !important}
    .rv{opacity:1 !important;transform:none !important}
    html{scroll-behavior:auto}
  }

  /* ---------- responsive ---------- */
  @media(max-width:1020px){
    .hero-grid{grid-template-columns:1fr;gap:44px}
    .hero{padding-top:120px}
    .hero .sub{max-width:100%}
    /* stacked hero: text runs full-width, so a vertical wash carries legibility
       (no left-anchored gradient) while the video still reads through it. */
    #bg .scrim{background:linear-gradient(180deg,
      rgba(255,255,255,.9) 0%, rgba(255,255,255,.78) 42%, rgba(255,255,255,.82) 74%, #fff 100%)}
    .d-stats{grid-template-columns:repeat(2,1fr);margin-top:16px}
    .amen-grid{grid-template-columns:repeat(2,1fr)}
    .about-grid{grid-template-columns:1fr}
    .steps{grid-template-columns:1fr}
    .cur-grid{grid-template-columns:1fr}
    .standards .grid3{grid-template-columns:1fr}
    .cities .grid4{grid-template-columns:1fr 1fr}
  }
  @media(max-width:760px){
    .nav{top:12px;width:calc(100% - 24px);padding:8px 8px 8px 14px}
    .nav-links{position:static;transform:none;gap:0}
    .nav-links button{padding:8px 9px;font-size:11px;letter-spacing:.04em}
    .nav-brand span{display:none}
    .nav .btn{padding:9px 14px;font-size:12px}
    .grid2{grid-template-columns:1fr}
    .stats{gap:26px;flex-wrap:wrap}
    .opts.two{grid-template-columns:1fr}
    .wiz-body{padding:22px 20px 24px}
    .page{padding-top:120px}
    .gallery img{width:300px;height:200px}
    .back-chip{top:88px;left:14px}
    .photos-chip{right:14px}
    .sticky-bar .in{padding:11px 16px}
    .sticky-bar .nm{font-size:16px}
    .d-hero{height:64vh}
    .track{gap:44px;padding-right:44px}
    .track img{height:26px}
    .modal{padding:26px 22px 24px}
    .chip-cta{right:14px;bottom:calc(16px + env(safe-area-inset-bottom,0px));padding:11px 16px;font-size:12px}
    .cities .grid4{grid-template-columns:1fr}
    .citycard{height:240px}
  }
</style>
</head>
<body>

<div id="bg">
  <video id="bgvid" muted playsinline preload="none" poster="assets/hero-scroll-poster.jpg">
    <source src="assets/hero-scroll.mp4" type="video/mp4">
  </video>
  <div class="scrim"></div>
</div>

<div id="app">
  <nav class="nav" id="nav"></nav>
  <main id="view"></main>
  <footer id="footer"></footer>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<div id="sticky-root"></div>
<div id="chip-root"></div>

<script src="propstar-data.js"></script>
<script>
(function () {
  'use strict';
  var P = window.PROPSTAR;
  var LEAD_KEY = 'propstar_lead';

  /* ============ state ============ */
  var S = {
    view: 'home',            // home | properties | about | detail
    step: 1,
    answers: { location: null, locality: null, budget: null, purpose: null },
    complete: false,
    pf: '',                  // properties city filter
    pcount: 6,               // properties visible count (Show more)
    modal: null,             // null | gate | contact | enquiry
    pendingProp: null,
    opened: null,
    openedFrom: 'home',
    lead: readLead(),
    props: P.load(),
    toastTimer: null
  };

  function readLead() {
    try { var l = JSON.parse(localStorage.getItem(LEAD_KEY)); return l && l.name ? l : null; }
    catch (e) { return null; }
  }

  /* storage can throw (private windows, blocked cookies, some file:// contexts) —
     leads and prompt counters must degrade to "works but doesn't persist",
     never take the form down with an uncaught SecurityError */
  function safeSet(kind, k, v) { try { (kind === 's' ? sessionStorage : localStorage).setItem(k, v); } catch (e) {} }
  function safeGet(kind, k) { try { return (kind === 's' ? sessionStorage : localStorage).getItem(k); } catch (e) { return null; } }
  function safeDel(kind, k) { try { (kind === 's' ? sessionStorage : localStorage).removeItem(k); } catch (e) {} }

  /* ============ tiny DOM utils ============ */
  function el(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function top() { window.scrollTo({ top: 0, behavior: 'auto' }); }

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) { e.target.classList.add('in'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  function observeReveals(root) {
    var seen = new Map();
    (root || document).querySelectorAll('.rv:not(.in)').forEach(function (n) {
      /* stagger siblings — cards ripple in rather than landing at once */
      var group = n.parentElement;
      var i = seen.get(group) || 0;
      seen.set(group, i + 1);
      n.style.transitionDelay = Math.min(i, 5) * 70 + 'ms';
      observer.observe(n);
    });
  }

  /* subtle parallax on the detail hero — luxury depth, disabled for reduced motion */
  window.addEventListener('scroll', function () {
    if (S.view !== 'detail') return;
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var img = document.querySelector('.d-hero>img');
    if (!img) return;
    var y = Math.min(window.scrollY, window.innerHeight);
    img.style.transform = 'translateY(' + (y * 0.18).toFixed(1) + 'px) scale(1.08)';
  }, { passive: true });

  function countUps(root) {
    (root || document).querySelectorAll('[data-count]').forEach(function (n) {
      var target = parseInt(n.getAttribute('data-count'), 10);
      var suffix = n.getAttribute('data-suffix') || '';
      var t0 = null, done = false;
      function tick(t) {
        if (done) return;
        if (!t0) t0 = t;
        var p = Math.min((t - t0) / 1400, 1);
        var eased = 1 - Math.pow(1 - p, 3);
        n.textContent = Math.round(target * eased).toLocaleString('en-IN') + suffix;
        if (p < 1) requestAnimationFrame(tick); else done = true;
      }
      requestAnimationFrame(tick);
      /* settle to the final value even if rAF is throttled (hidden tab) */
      setTimeout(function () { if (!done) { done = true; n.textContent = target.toLocaleString('en-IN') + suffix; } }, 1700);
    });
  }

  /* ============ svg icons (inline only) ============ */
  var I = {
    arrow: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
    back: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>',
    lock: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>',
    tick: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    ticksm: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    chev: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',
    photos: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
    x: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
    ig: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>',
    fb: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 8h3V5h-3a4 4 0 0 0-4 4v2H7v3h3v7h3v-7h3l1-3h-4V9a1 1 0 0 1 1-1z"/></svg>',
    li: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5A2.5 2.5 0 1 1 5 8.48a2.5 2.5 0 0 1-.02-4.98zM3 9.5h4V21H3zM10 9.5h3.8v1.6h.05c.53-1 1.83-2.06 3.77-2.06 4.03 0 4.78 2.65 4.78 6.1V21h-4v-5.2c0-1.24-.02-2.84-1.73-2.84-1.73 0-2 1.35-2 2.75V21h-4z"/></svg>',
    wa: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm5.3 14.2c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.4-.7-2.9-1.1-4.7-4-4.9-4.2-.1-.2-1.1-1.5-1.1-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.4l.9 2.1c.1.2.1.4 0 .6l-.4.6-.5.5c-.2.2-.3.4-.1.7.2.3.9 1.5 2 2.4 1.4 1.2 2.5 1.6 2.9 1.7.3.2.5.1.7-.1l1-1.2c.2-.3.4-.2.7-.1l2.1 1c.3.2.5.3.6.4 0 .2 0 .7-.2 1.2z"/></svg>',
    dia: '◆'
  };

  /* ============ nav ============ */
  function renderNav() {
    el('nav').innerHTML =
      '<div class="nav-brand" onclick="App.goHome()">' +
        '<img src="assets/propstar-mark-96.png" alt="Propstar">' +
        '<span>Propstar</span></div>' +
      '<div class="nav-links">' +
        '<button class="' + (S.view === 'home' ? 'on' : '') + '" onclick="App.goHome()">Home</button>' +
        '<button class="' + (S.view === 'properties' ? 'on' : '') + '" onclick="App.goProperties()">Properties</button>' +
        '<button class="' + (S.view === 'about' ? 'on' : '') + '" onclick="App.goAbout()">About</button>' +
      '</div>' +
      '<button class="btn" onclick="App.openContact()">Contact us</button>';
  }

  /* ============ wizard ============ */
  function wizardHTML() {
    var steps = P.activeSteps();
    var total = steps.length;
    var qs = P.questions();
    var pct, stepLbl, body;

    if (S.complete) {
      pct = 100; stepLbl = 'Matches ready';
      body =
        '<div class="wiz-step" style="text-align:center;padding:12px 0 4px">' +
          '<div class="done-tick">' + I.tick + '</div>' +
          '<div class="wiz-q">Your shortlist is ready' + (S.lead ? ', ' + esc(firstName(S.lead.name)) : '') + '.</div>' +
          '<div class="wiz-hint" style="margin-top:8px">Handpicked from every project on Propstar. No prices on display, no pressure.</div>' +
          '<button class="btn" onclick="App.scrollToResults()">View my matches ' + I.arrow + '</button>' +
          '<div class="privacy-line" style="justify-content:center">' + I.lock + ' Your advisor steps in only when you ask.</div>' +
          '<div style="text-align:center;margin-top:10px"><button class="start-over" onclick="App.restartQuiz()">Change my answers</button></div>' +
        '</div>';
    } else if (S.step <= total) {
      var id = steps[S.step - 1];
      var q = qs[id];
      pct = Math.round((S.step / (total + 2)) * 100);
      stepLbl = 'Step ' + S.step + ' of ' + total;
      var opts = '', grid = '';
      if (id === 'city') {
        grid = 'two';
        opts = P.LOCATIONS.map(function (o) {
          return optRow('city', o.key, o.label, o.hint, S.answers.location === o.key);
        }).join('');
      } else if (id === 'locality') {
        grid = 'two';

    } else {
      eyebrow = 'Register interest';
      title = 'Propstar × ' + (S.opened ? esc(S.opened.developer) : 'Project team');
      sub = 'Your advisor will follow up with full details and can arrange a private site visit.';
      cta = 'Request information';
      extra = '<div class="field"><label>Message <span style="opacity:.55;text-transform:none;letter-spacing:0">(optional)</span></label>' +
        '<textarea id="m-msg" rows="3" placeholder="Anything specific you\'d like to know?"></textarea></div>';
    }
    var lead = S.lead || {};
    r.innerHTML = '<div class="mscrim" onclick="App.closeModal()"><div class="modal" role="dialog" aria-modal="true" aria-label="' + eyebrow + '" onclick="event.stopPropagation()">' +
      '<button class="x" aria-label="Close" onclick="App.closeModal()">' + I.x + '</button>' +
      '<div class="eyebrow">' + eyebrow + '</div>' +
      '<h3>' + title + '</h3><div class="sub">' + sub + '</div>' +
      '<form onsubmit="App.modalSubmit(event)">' +
        '<div class="field"><label>Full name</label><input id="m-name" type="text" value="' + esc(lead.name || '') + '" placeholder="Your name" autocomplete="name"></div>' +
        '<div class="field"><label>Phone</label><div class="phone-wrap"><span class="cc">+91</span>' +
          '<input id="m-phone" type="tel" inputmode="tel" value="' + esc(lead.phone || '') + '" placeholder="98xxxxxxxx" style="flex:1" autocomplete="tel"></div></div>' +
        (mode === 'enquiry' ? extra :
          '<div class="field"><label>Email <span style="opacity:.55;text-transform:none;letter-spacing:0">(optional)</span></label>' +
          '<input id="m-email" type="email" value="' + esc(lead.email || '') + '" placeholder="you@example.com" autocomplete="email"></div>') +
        '<div id="m-err"></div>' +
        '<button class="btn" type="submit">' + cta + ' ' + I.arrow + '</button>' +
      '</form>' + altPath +
      '<div class="privacy-line">' + I.lock + ' We respect your privacy. Your details stay with Propstar.</div>' +
    '</div></div>';
    var first = document.getElementById('m-name');
    if (first && !first.value) setTimeout(function () { first.focus(); }, 120);
  }

  function toast(msg) {
    var r = el('toast-root');
    r.innerHTML = '<div class="toast"><span class="tick">' + I.ticksm + '</span>' + esc(msg) + '</div>';
    clearTimeout(S.toastTimer);
    S.toastTimer = setTimeout(function () { r.innerHTML = ''; }, 2600);
  }

  /* ============ render root ============ */
  function render() {
    renderNav();
    var v = el('view');
    v.innerHTML = '<div class="view-in">' +
      (S.view === 'home' ? homeHTML()
        : S.view === 'properties' ? propertiesHTML()
        : S.view === 'about' ? aboutHTML()
        : detailHTML()) + '</div>';
    renderFooter();
    renderSticky();
    el('bg').style.opacity = S.view === 'home' ? '1' : '0';
    el('bg').style.transition = 'opacity .6s var(--ease)';
    document.body.style.background = (S.view === 'properties') ? '#F6F8FB' : '#fff';
    observeReveals(v);
    if (S.view === 'home') countUps(v);
  }

  function rerenderWizard() {
    var m = el('wizmount');
    if (m) m.innerHTML = wizardHTML();
  }

  /* ============ hash routing ============ */
  function routeFromHash() {
    var h = location.hash.replace(/^#\/?/, '');
    if (h.indexOf('project/') === 0) {
      var id = h.slice(8);
      var p = S.props.find(function (o) { return o.id === id; });
      if (p) {
        if (S.lead) { S.opened = p; S.view = 'detail'; }
        else { S.view = 'properties'; S.pendingProp = p; S.modal = 'gate'; }
      } else { S.view = 'home'; }
    } else if (h === 'properties') { S.view = 'properties'; S.opened = null; }
    else if (h === 'about') { S.view = 'about'; S.opened = null; }
    else { S.view = 'home'; S.opened = null; }
  }

  function nav(hash) {
    if (location.hash === hash) { routeFromHash(); render(); renderModal(); top(); }
    else location.hash = hash;
  }

  window.addEventListener('hashchange', function () {
    S.modal = null; S.pendingProp = null;
    routeFromHash();
    render(); renderModal(); top();
  });

  /* ============ app actions ============ */
  var App = {
    goHome: function () { nav('#/'); },
    goProperties: function () { nav('#/properties'); },
    goAbout: function () { nav('#/about'); },
    filter: function (k) { S.pf = k; S.pcount = 6; render(); },

    showMore: function () {
      S.pcount += 6;
      /* re-render just the listing so scroll position is kept */
      var anchor = window.scrollY;
      render();
      window.scrollTo({ top: anchor, behavior: 'auto' });
    },

    exploreCity: function (k) { S.pf = k; S.pcount = 6; App.goProperties(); },

    toQuiz: function () {
      if (!S.complete) { S.step = 1; }
      nav('#/');
    },

    pick: function (kind, key) {
      var map = { city: 'location', locality: 'locality', budget: 'budget', purpose: 'purpose' };
      S.answers[map[kind]] = key;
      if (kind === 'city') S.answers.locality = null;
      var total = P.activeSteps().length;
      /* brief highlight, then advance — deliberate, never rushed */
      rerenderWizard();
      setTimeout(function () {
        if (S.step < total) { S.step++; rerenderWizard(); }
        else if (S.lead) { App.finish(); }
        else { S.step = total + 1; rerenderWizard(); }
      }, 260);
    },

    submitLead: function (ev) {
      ev.preventDefault();
      var name = el('lead-name').value.trim();
      var phone = el('lead-phone').value.replace(/\D/g, '');
      var email = el('lead-email').value.trim();
      if (!name || phone.length < 10) {
        el('lead-err').innerHTML = '<div class="form-err">Please add your name and a 10-digit phone number.</div>';
        return;
      }
      S.lead = { name: name, phone: phone, email: email };
      safeSet('l', LEAD_KEY, JSON.stringify(S.lead));
      Engage.captured();
      App.finish();
    },

    resetLead: function () {
      safeDel('l', LEAD_KEY);
      S.lead = null;
      rerenderWizard();
    },

    wizBack: function () {
      var total = P.activeSteps().length;
      if (S.step > total) S.step = total; else if (S.step > 1) S.step--;
      rerenderWizard();
    },

    restartQuiz: function () {
      S.answers = { location: null, locality: null, budget: null, purpose: null };
      S.step = 1; S.complete = false;
      if (S.view !== 'home') { nav('#/'); } else { render(); top(); }
    },

    finish: function () {
      S.complete = true;
      nav('#/');
      App.scrollToResults();
    },

    scrollToResults: function () {
      setTimeout(function () {
        var r = el('results');
        if (r) window.scrollTo({ top: r.getBoundingClientRect().top + window.scrollY - 84, behavior: 'smooth' });
      }, 160);
    },

    openProp: function (id, source) {
      var p = S.props.find(function (o) { return o.id === id; });
      if (!p) return;
      if (source === 'gate' || !S.lead) {
        S.pendingProp = p; S.modal = 'gate'; renderModal();
      } else {
        App.showDetail(p);
      }
    },

    showDetail: function (p) {
      S.openedFrom = S.view === 'detail' ? S.openedFrom : S.view;
      nav('#/project/' + p.id);
    },

    detailBack: function () {
      var home = S.openedFrom !== 'properties';
      nav(home ? '#/' : '#/properties');
      if (home && S.complete) App.scrollToResults();
    },

    openContact: function () { S.modal = 'contact'; renderModal(); },
    openEnquiry: function () { S.modal = 'enquiry'; renderModal(); },
    openShortlist: function () { S.modal = 'shortlist'; renderModal(); },
    quizFromPrompt: function () {
      S.modal = null; renderModal();
      App.restartQuiz();
    },
    closeModal: function () {
      var was = S.modal;
      S.modal = null; S.pendingProp = null; renderModal();
      if (was === 'shortlist') Engage.dismissed();
    },

    modalSubmit: function (ev) {
      ev.preventDefault();
      var name = el('m-name').value.trim();
      var phone = el('m-phone').value.replace(/\D/g, '');
      var emailEl = el('m-email');
      var email = emailEl ? emailEl.value.trim() : (S.lead && S.lead.email) || '';
      if (!name || phone.length < 10) {
        el('m-err').innerHTML = '<div class="form-err">Please add your name and a 10-digit phone number.</div>';
        return;
      }
      S.lead = { name: name, phone: phone, email: email };
      safeSet('l', LEAD_KEY, JSON.stringify(S.lead));
      Engage.captured();
      var mode = S.modal, pending = S.pendingProp;
      S.modal = null; S.pendingProp = null;
      renderModal();
      if (mode === 'gate' && pending) { App.showDetail(pending); }
      else if (mode === 'contact') { toast('Message sent. We\'ll be in touch.'); }
      else if (mode === 'shortlist') { toast('You\'re on the list. Your shortlist is on its way.'); render(); }
      else { toast('Request sent. Your advisor will be in touch.'); }
    }
  };
  window.App = App;

  /* ============ engagement-triggered capture ============ */
  var Engage = {
    dwellMs: 15000,        /* show after 15s on site */
    scrollPct: 0.30,       /* …or 30% scroll depth on home / properties / about */
    maxAuto: 3,            /* at most 3 automatic shows per session */
    cooldownMs: 30000,
    demo: new URLSearchParams(location.search).get('demo') === '1',
    lastShow: 0, chip: false, timer: null,
    shows: function () { return +(safeGet('s', 'ps_prompt_n') || 0); },
    quizBusy: function () {
      return S.view === 'home' && !S.complete &&
        !!(S.step > 1 || S.answers.location || S.answers.budget || S.answers.purpose);
    },
    canAuto: function (now) {
      if (S.modal || S.view === 'detail' || Engage.quizBusy()) return false;
      if (Engage.demo) return (now - Engage.lastShow) > 10000;   /* demo: only a 10s spacing */
      return !S.lead && Engage.shows() < Engage.maxAuto && (now - Engage.lastShow) > Engage.cooldownMs;
    },
    fire: function () {
      var now = Date.now();
      if (!Engage.canAuto(now)) return;
      safeSet('s', 'ps_prompt_n', Engage.shows() + 1);
      Engage.lastShow = now;
      App.openShortlist();
    },
    dismissed: function () { if (!S.lead || Engage.demo) { Engage.chip = true; renderChip(); } },
    captured: function () { Engage.chip = false; renderChip(); clearTimeout(Engage.timer); },
    init: function () {
      if (S.lead && !Engage.demo) return;
      /* the chip is on from the first paint — a persistent, quiet enquiry point */
      Engage.chip = true; renderChip();
      Engage.timer = setTimeout(Engage.fire, Engage.dwellMs);
      window.addEventListener('scroll', function () {
        if (S.view === 'detail' || (S.lead && !Engage.demo)) return;
        var max = document.documentElement.scrollHeight - window.innerHeight;
        if (max > 0 && window.scrollY / max >= Engage.scrollPct) Engage.fire();
      }, { passive: true });
      document.addEventListener('mouseout', function (e) {
        if (!e.relatedTarget && e.clientY <= 0) Engage.fire();
      });
    }
  };

  function renderChip() {
    el('chip-root').innerHTML = (Engage.chip && (!S.lead || Engage.demo))
      ? '<button class="chip-cta" onclick="App.openShortlist()"><span class="spark">✦</span> Get your curated shortlist</button>'
      : '';
    chipAvoid();
  }

  /* the chip and the wizard both capture leads — when the wizard card overlaps
     the chip's corner, fade the chip out so it never covers the question or form */
  function chipAvoid() {
    var chip = document.querySelector('.chip-cta');
    if (!chip) return;
    var w = el('wizcard'), hide = false;
    if (w) {
      var r = w.getBoundingClientRect(), c = chip.getBoundingClientRect();
      hide = !(r.right < c.left - 8 || r.left > c.right + 8 ||
               r.bottom < c.top - 8 || r.top > c.bottom + 8);
    }
    chip.classList.toggle('hid', hide);
  }
  window.addEventListener('scroll', chipAvoid, { passive: true });
  window.addEventListener('resize', chipAvoid);

  window.Engage = Engage;   /* exposed so timings are tunable without digging */

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && S.modal) App.closeModal();
  });

  /* ============ background video prefs ============ */
  var videoBg = new URLSearchParams(location.search).get('video') !== '0';
  (function initBg() {
    var vid = el('bgvid');
    function usePoster() {
      if (!vid.parentNode) return;   /* already swapped */
      var img = document.createElement('img');
      img.className = 'poster'; img.src = 'assets/hero-scroll-poster.jpg'; img.alt = '';
      vid.replaceWith(img);
    }
    function mobileUpgrade() {
      if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var c = navigator.connection;
      if (c && (c.saveData || /(^|-)2g/.test(c.effectiveType || ''))) return;
      var mv = document.createElement('video');
      mv.muted = true; mv.setAttribute('muted', '');
      mv.playsInline = true; mv.setAttribute('playsinline', '');
      mv.preload = 'auto';
      mv.src = 'assets/hero-scroll-mobile.mp4';
      mv.style.opacity = '0'; mv.style.transition = 'opacity .6s ease';
      mv.addEventListener('error', function () { if (mv.parentNode) mv.parentNode.removeChild(mv); });
      mv.addEventListener('canplaythrough', function swap() {
        mv.removeEventListener('canplaythrough', swap);
        var bg = el('bg'), poster = bg.querySelector('img.poster');
        bg.insertBefore(mv, bg.querySelector('.scrim'));   /* under the scrim, over the poster */
        scrubOnScroll(mv);
        requestAnimationFrame(function () { mv.style.opacity = '1'; });
        setTimeout(function () { if (poster && poster.parentNode) poster.parentNode.removeChild(poster); }, 800);
      });
      mv.load();
    }
    /* phones start on the poster (instant paint, LCP-safe), then upgrade to a
       lightweight 960px all-intra encode (~8.5 MB vs 44.6 MB) in the background
       and fade it in once it's scrub-ready — so the scroll animation works on
       phones too without making anyone stare at a loading hero. Skipped on
       Save-Data / 2G connections and reduced motion. The landscape check catches
       phones held sideways (wide but short + touch), which the width check
       alone would miss. */
    if (!videoBg || matchMedia('(max-width:760px)').matches ||
        matchMedia('(max-height:500px) and (pointer:coarse)').matches) {
      usePoster();
      mobileUpgrade();
      return;
    }
    /* any load/decode failure → clean poster fallback instead of a dark box */
    vid.addEventListener('error', usePoster);
    var srcEl = vid.querySelector('source');
    if (srcEl) srcEl.addEventListener('error', usePoster);
    /* scrim is fully defined in CSS (see #bg .scrim) so poster and video modes
       share one legibility treatment — no JS override that could drift */

    /* reduced motion: hold the first frame of the full file, no scroll scrub */
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      vid.preload = 'auto';
      vid.load();
      return;
    }

    /* Desktop quality ladder: a small 640px starter begins scrubbing within
       about a second on any broadband; the full-quality file (AV1 where the
       browser decodes it, else H.264) downloads behind it and swaps in at the
       same timestamp once it can play through. If the full file ever fails,
       the starter simply stays — no visible break. */
    vid.src = 'assets/hero-scroll-starter.mp4';   /* overrides the <source> */
    vid.preload = 'auto';
    vid.load();
    scrubOnScroll(vid);

    var fullSrc = vid.canPlayType('video/mp4; codecs="av01.0.08M.08"')
      ? 'assets/hero-scroll-av1.mp4' : 'assets/hero-scroll.mp4';
    var fv = document.createElement('video');
    fv.muted = true; fv.setAttribute('muted', '');
    fv.playsInline = true; fv.setAttribute('playsinline', '');
    fv.preload = 'auto'; fv.src = fullSrc;
    fv.style.opacity = '0'; fv.style.transition = 'opacity .5s ease';
    fv.addEventListener('canplaythrough', function swap() {
      fv.removeEventListener('canplaythrough', swap);
      var bg = el('bg');
      bg.insertBefore(fv, bg.querySelector('.scrim'));   /* under the scrim */
      try { fv.currentTime = vid.currentTime || 0; } catch (e) {}
      scrubOnScroll(fv);
      requestAnimationFrame(function () { fv.style.opacity = '1'; });
      setTimeout(function () { if (vid.parentNode) vid.parentNode.removeChild(vid); }, 700);
    });
    fv.load();
  })();

  /* Map vertical scroll to the hero video's timeline: scrolling down "plays" the
     zoom baked into the clip, scrolling up rewinds it. The video is re-encoded
     all-intra (every frame a keyframe) so seeks are instant. Seeks are gated on
     the 'seeked' event: while one seek is in flight, the newest scroll target is
     held in `pending` and fired on completion — so rapid scrolling coalesces into
     one in-flight seek instead of piling up (a pile-up stalls the renderer). The
     video is never played(), so it can't run past the scroll-driven frame. */
  function scrubOnScroll(vid) {
    var SCRUB_VH = 1.8;                 // scroll distance (viewport heights) = whole clip
                                        // (tuned up for the longer 14.7s flythrough so it
                                        // eases past rather than racing by inside the hero)
    var dur = 0, target = 0, seeking = false, pending = false;

    function onScroll() {
      if (!dur) return;
      var span = Math.max(1, window.innerHeight * SCRUB_VH);
      var p = Math.min(1, Math.max(0, window.scrollY / span));
      target = p * (dur - 0.05);        // stay just off the very last frame
      seek();
    }
    function seek() {
      if (seeking) { pending = true; return; }
      if (Math.abs((vid.currentTime || 0) - target) < 0.015) return;
      seeking = true; pending = false;
      try { vid.currentTime = target; } catch (e) { seeking = false; }
    }
    vid.addEventListener('seeked', function () { seeking = false; if (pending) seek(); });
    /* safety net: if a 'seeked' is ever missed, don't wedge the gate shut */
    vid.addEventListener('error', function () { seeking = false; });

    function start() {
      dur = vid.duration || 0; seeking = false; pending = false;
      if (!dur) return;
      onScroll();
      /* Some static servers (python -m http.server, and others people reach for
         when they get this folder) ignore Range requests; the browser then
         reports the video unseekable and clamps every seek to frame 0 — the
         scrub looks dead with no error. Detect that and self-heal: pull the
         whole clip into a blob (instant on localhost) and scrub from memory. */
      setTimeout(function () {
        if (vid.dataset.blobbed) return;
        var end = vid.seekable.length ? vid.seekable.end(vid.seekable.length - 1) : 0;
        if (end > dur - 0.5) return;   /* server seeks fine — nothing to do */
        vid.dataset.blobbed = '1';
        var srcEl = vid.querySelector('source');
        fetch(vid.currentSrc || (srcEl && srcEl.src))
          .then(function (r) { return r.blob(); })
          .then(function (b) { vid.src = URL.createObjectURL(b); vid.load(); })
          .catch(function () {});      /* fetch failed → poster frame stays, page still works */
      }, 1000);
    }
    vid.addEventListener('loadedmetadata', start);   /* re-fires after the blob swap */
    if (vid.readyState >= 1) start();

    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
  }

  /* ============ cross-tab sync ============ */
  function refreshStores() {
    S.props = P.load();
    if (S.opened) {
      var again = S.props.find(function (o) { return o.id === S.opened.id; });
      if (again) S.opened = again; else { S.view = S.openedFrom || 'home'; S.opened = null; }
    }
    var total = P.activeSteps().length;
    if (!S.complete && S.step > total + 1) S.step = total + 1;
    render();
  }
  window.addEventListener('focus', refreshStores);
  window.addEventListener('storage', function (e) {
    if (e.key === 'propstar_properties_v3' || e.key === 'propstar_quiz_v4') refreshStores();
  });

  routeFromHash();
  render();
  renderModal();
  Engage.init();
})();
</script>
</body>
</html>
